        px:
          $ref: '#/components/schemas/SignedDecimal'
          description: Price level
          example: '0.1668'
        qty:
          $ref: '#/components/schemas/UnsignedDecimal'
          description: Aggregated quantity at this price level
          example: '4418.7970'
