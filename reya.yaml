        - exchangeId
        - symbol
        - accountId
        - qty
        - side
        - fee
        - price
        - type
        - timestamp
        - sequenceNumber
      properties:
        exchangeId:
          $ref: '#/components/schemas/UnsignedInteger'
          example: 1
        symbol:
          $ref: '#/components/schemas/Symbol'
        accountId:
          $ref: '#/components/schemas/UnsignedInteger'
          example: 12345
        qty:
          $ref: '#/components/schemas/UnsignedDecimal'
          example: '1.0'
        side:
          $ref: '#/components/schemas/Side'
        price:
          $ref: '#/components/schemas/SignedDecimal'
          example: '43000.00'
        fee:
          $ref: '#/components/schemas/SignedDecimal'
          example: '0.50'
        type:
          $ref: '#/components/schemas/ExecutionType'
        timestamp:
          $ref: '#/components/schemas/UnsignedInteger'
          description: Execution timestamp (milliseconds)
          example: 1747927089946
        sequenceNumber:
          $ref: '#/components/schemas/UnsignedInteger'
          description: Execution sequence number, increases by 1 for every perp execution in reya chain
