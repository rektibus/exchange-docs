    OrderType:
      title: OrderType
      $id: '#OrderType'
      x-parser-schema-id: OrderType
      type: string
      enum:
        - LIMIT
        - TP
        - SL
      description: Order type, (LIMIT = Limit, TP = Take Profit, SL = Stop Loss)
