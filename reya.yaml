          example: '63552420037263360'
        side:
          $ref: '#/components/schemas/Side'
        qty:
          $ref: '#/components/schemas/UnsignedDecimal'
          example: '1.0'
        price:
          $ref: '#/components/schemas/SignedDecimal'
          example: '43000.00'
        fee:
          $ref: '#/components/schemas/SignedDecimal'
          example: '0.0'
        type:
          $ref: '#/components/schemas/ExecutionType'
        timestamp:
          $ref: '#/components/schemas/UnsignedInteger'
          description: Execution timestamp (milliseconds)
          example: 1747927089946
      additionalProperties: true
    Address:
      title: Address
      $id: '#Address'
      x-parser-schema-id: Address
      type: string
      pattern: ^0x[a-fA-F0-9]{40}$
      examples:
        - '0x6c51275fd01d5dbd2da194e92f920f8598306df2'
